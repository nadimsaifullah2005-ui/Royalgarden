<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - The Royal Garden</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>The Royal Garden</h1>
    </header>

    <nav>
        <a href="index.html">Home</a>
        <a href="menu.html">Menu</a>
        <a href="gallery.html">Gallery</a>
        <a href="contact.html">Contact</a>
    </nav>
    <main>
        <section>
            <h2>Contact Us</h2>
            <p>We'd love to hear from you! Send us a message below and we'll get back to you as soon as possible.</p>
            
            <form>
                <label for="name">Name</label>
                <input type="text" id="name" name="name">

                <label for="email">Email</label>
                <input type="email" id="email" name="email">

                <label for="message">Message</label>
                <textarea id="message" name="message" rows="5"></textarea>

                <button type="submit">Send Message</button>
            </form>
        </section>
        <section>
            <h2>Opening Hours</h2>
            <p><span class="day">Monday - Friday:</span> 7:00 AM - 5:00 PM</p>
            <p><span class="day">Saturday:</span> 8:00 AM - 4:00 PM</p>
            <p><span class="day">Sunday:</span> 9:00 AM - 3:00 PM</p>
        </section>
    </main>
    <footer>
        <p>&copy; 2026 The Royal Garden</p>
    </footer>
</body>
</html>
